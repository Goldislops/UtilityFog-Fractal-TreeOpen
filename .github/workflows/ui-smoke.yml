name: UI Smoke Tests

on:
  push:
    branches: [ main, develop ]
    paths: [ 'utilityfog_frontend/frontend/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'utilityfog_frontend/frontend/**' ]

permissions:
  contents: read

jobs:
  ui-smoke:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: utilityfog_frontend/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Bundle budget unit tests
        run: npm run test:budget

      - name: Build production bundle
        run: npm run build

      - name: Bundle budget check
        run: npm run check:budget

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Playwright smoke tests still run against the Vite dev server (see
      # playwright.config.ts); the production build above exists to feed the
      # bundle-budget gate.

      - name: Run smoke tests
        run: npm run test:ui

      - name: Upload test report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report
          path: utilityfog_frontend/frontend/playwright-report/
          retention-days: 7
