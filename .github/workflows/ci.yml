name: CI
on:
  pull_request:
  push:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Detect Node project
        id: detect
        run: |
          if [ -f package.json ]; then echo "has_node=true" >> $GITHUB_OUTPUT; else echo "has_node=false" >> $GITHUB_OUTPUT; fi

      - name: Setup Node
        if: steps.detect.outputs.has_node == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        if: steps.detect.outputs.has_node == 'true'
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        if: steps.detect.outputs.has_node == 'true'
        run: |
          if [ -f tsconfig.json ] || npx --yes tsc -v >/dev/null 2>&1; then
            npx --yes tsc -noEmit
          else
            echo "No TypeScript config found; skipping"
          fi

      - name: Lint
        if: steps.detect.outputs.has_node == 'true'
        run: |
          if npm run -s | grep -q "^  lint$"; then
            npm run lint
          else
            echo "No lint script; skipping"
          fi

      - name: Build
        if: steps.detect.outputs.has_node == 'true'
        run: |
          if npm run -s | grep -q "^  build$"; then
            npm run build
          else
            echo "No build script; skipping"
          fi

      - name: Test
        if: steps.detect.outputs.has_node == 'true'
        run: |
          if npm run -s | grep -q "^  test$"; then
            npm test --silent -- --ci || npm test --silent
          else
            echo "No test script; skipping"
          fi

  # Python test gate (issue #165). The Node `verify` job above skips every
  # step when no package.json is present, so for this Python repo it was
  # auto-passing without running anything. This job runs the maintained
  # Python suites so a real regression fails the build visibly.
  #
  # Scope note: targets the two maintained nextness suites explicitly rather
  # than bare `pytest`, because several pre-existing modules fail at
  # collection (uft_ca / utilityfog_frontend.cli_viz imports, root-level
  # *_test.py scripts) — tracked separately. These two files are exactly the
  # suite verified locally for PRs #160–#164 (275 tests). Broadening coverage
  # (fixing or excluding the broken collectors) is a follow-up under #165.
  verify-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          # numpy + pytest + pytest-asyncio, plus the pip-installable test deps
          # (matplotlib/flask/pyzmq/openai) so their suites RUN instead of skip
          # (#165 skip-conversion).
          pip install numpy pytest pytest-asyncio matplotlib flask pyzmq openai

      - name: Setup Rust toolchain (uft_ca pyo3 extension)
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master-history action pin; rolling stable selected below
        with:
          toolchain: stable

      - name: Build & install uft_ca (maturin via pip)
        run: |
          # #180: build the Rust pyo3 extension so its ~95 tests RUN instead
          # of self-skipping. pip drives the maturin build backend declared
          # in crates/uft_ca/pyproject.toml.
          pip install ./crates/uft_ca

      - name: Run maintained Python test suite
        run: |
          # Gate the full tests/ suite with the Rust extension built (#165 +
          # #180). Under this install every module either passes or
          # self-skips (verified locally: 832 passed, 8 skipped, 0 failed,
          # 0 errors). pytest.ini scopes collection to tests/ and keeps
          # root-level legacy scripts out.
          python -m pytest tests/ -q
