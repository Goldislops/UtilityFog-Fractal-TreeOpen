name: CI
on:
  pull_request:
  push:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  # Python test gate (issue #165). Historical: a root-level Node `verify`
  # job used to sit above this one; with no root package.json it skipped
  # every step and auto-passed. It was removed from the required set
  # (branch-protection Phase 2, 2026-07-12) and then deleted here. This
  # job runs the maintained Python suites so a real regression fails the
  # build visibly.
  #
  # Scope note: gates the full tests/ suite (pytest.ini scopes collection to
  # tests/ and keeps the root-level legacy *_test.py scripts out). The uft_ca
  # pyo3 extension is built below so its suites run instead of self-skipping
  # (#165 skip-conversion + #180). Historical: this job originally targeted
  # only the two maintained nextness suites (the set verified for
  # PRs #160–#164) while the broken collectors were being fixed under #165.
  verify-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          # numpy + pytest + pytest-asyncio, plus the pip-installable test deps
          # (matplotlib/flask/pyzmq/openai) so their suites RUN instead of skip
          # (#165 skip-conversion).
          pip install numpy pytest pytest-asyncio matplotlib flask pyzmq openai

      - name: Setup Rust toolchain (uft_ca pyo3 extension)
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master-history action pin; rolling stable selected below
        with:
          toolchain: stable

      - name: Build & install uft_ca (maturin via pip)
        run: |
          # #180: build the Rust pyo3 extension so its ~95 tests RUN instead
          # of self-skipping. pip drives the maturin build backend declared
          # in crates/uft_ca/pyproject.toml.
          pip install ./crates/uft_ca

      - name: Run maintained Python test suite
        run: |
          # Gate the full tests/ suite with the Rust extension built (#165 +
          # #180). Under this install every module either passes or
          # self-skips (verified locally: 832 passed, 8 skipped, 0 failed,
          # 0 errors). pytest.ini scopes collection to tests/ and keeps
          # root-level legacy scripts out.
          python -m pytest tests/ -q

  # Frontend quality gate (issue #6). The removed root Node `verify` job
  # was inert for this repo layout (no root package.json), so frontend
  # regressions never failed CI here. This job runs the real gates from
  # the app directory on every push/PR — deliberately NO path filter, so the check
  # is always present and branch protection can require it without wedging
  # non-frontend PRs. Fork-compatible: read-only permissions, no secrets.
  # The Playwright E2E suite is deliberately excluded (no browser
  # downloads); ui-smoke.yml owns that.
  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: utilityfog_frontend/frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: utilityfog_frontend/frontend/package-lock.json

      - name: Install (deterministic, from committed lockfile)
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests + coverage contract (Vitest, jsdom — Playwright E2E stays in ui-smoke)
        # Coverage thresholds gate only the explicitly unit-owned modules
        # (see vitest.config.ts coverage block); measured stable across
        # repeated runs, adds ~2s over the plain unit run.
        run: npm run test:unit:coverage

      - name: Coverage-gate self-tests
        run: npm run test:coverage-gate

      - name: Per-file coverage floors
        # Enforceable per-module floors over the json-summary the previous
        # step generated — a regression, a silently missing module row, or
        # a malformed summary all fail (scripts/check-unit-coverage.mjs).
        run: npm run check:unit-coverage

      - name: Budget-script unit tests
        run: npm run test:budget

      - name: Build
        run: npm run build

      - name: Bundle budget
        run: npm run check:budget
