name: Agent Safety Suite

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  agent-safety:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install OPA
        run: |
          set -euxo pipefail
          # Trust anchor: SHA-256 of opa_linux_amd64_static at OPA v0.59.0,
          # independently verified against the official release checksum asset
          # (opa_linux_amd64_static.sha256). Embedded statically — NOT fetched
          # at CI time, NOT derived from the downloaded binary — and checked
          # before chmod/mv/exec so a tampered or corrupted download fails
          # the job closed.
          readonly OPA_SHA256="5f615343a1cae1deb2f2f514b2f4b46456495fe1c828b17e779eb583aced0cc3"
          # Use GitHub Releases mirror (same binary, different host) — the
          # openpolicyagent.org CDN has been flaky from the GitHub Actions
          # runner IP range. --fail surfaces HTTP errors; --retry handles
          # transient connection drops.
          curl -L --fail --retry 5 --retry-delay 5 --retry-all-errors \
            -o opa \
            https://github.com/open-policy-agent/opa/releases/download/v0.59.0/opa_linux_amd64_static
          printf '%s  %s\n' "${OPA_SHA256}" opa | sha256sum --check --strict -
          chmod +x opa
          sudo mv opa /usr/local/bin/opa
          opa version

      - name: OPA fmt + check
        run: |
          set -euxo pipefail
          mkdir -p dist
          # Show any formatting diffs (does not fail build)
          { opa fmt policy/ --diff || true; } | tee dist/fmt.txt
          # Fail on invalid policy
          opa check policy/

      - name: OPA unit tests (coverage)
        run: |
          set -euxo pipefail
          opa test -v --coverage policy/ | tee dist/coverage.txt
          opa test --coverage --format=json policy/ > dist/opa_coverage.json

      - name: Run matrix (if present)
        run: |
          set -euxo pipefail
          if [ -f scripts/matrix_runner.sh ]; then
            chmod +x scripts/matrix_runner.sh
            ./scripts/matrix_runner.sh | tee dist/matrix_run.txt
          else
            echo "matrix_runner.sh not found; skipping matrix run" | tee dist/matrix_run.txt
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: agent-safety-artifacts
          path: |
            dist/**
