# CA Rule v0.6.0 — The COMPUTE Awakening
#
# v0.5.0 achieved stable 4-state equilibrium (H=0.669) but COMPUTE stuck at 1%.
# v0.6.0 breaks the COMPUTE bottleneck:
#   - STRUCTURAL differentiates to COMPUTE at 3-6 neighbours (was 3-4)
#   - STRUCTURAL survives at 0-2 AND 7-8 (high-density survival restored)
#   - COMPUTE survival widened to 0-5 (was 1-3)
#   - Contagion pressure on COMPUTE halved (15% vs 30%)
#   - Stochastic COMPUTE drain slashed (3% vs 10%)
#   - Density-targeting: adaptive probability curve targets 25% COMPUTE
#   - VOID can nucleate directly to ENERGY (new pathway)
#
# Nemo (Kimi K2.5): density-targeting probability curve mathematics
# Jack (GPT-5.4): Rust core integration + safety review
# Claude (Opus 4.6): Python engine integration + QA

[rule]
name = "branching-growth-v0.6"
states = ["VOID", "STRUCTURAL", "COMPUTE", "ENERGY", "SENSOR"]
neighborhood = "moore-3d"
transition = "outer-totalistic"

[params]
# Deterministic backbone; stochastic/contagion/density-targeting introduce non-determinism.

# --- Transitions: { neighbour_count = "TARGET_STATE" } ---

[params.transitions.VOID]
# Wider nucleation: STRUCTURAL at 3-6 (unchanged) + ENERGY at 2 (NEW pathway)
2 = "ENERGY"
3 = "STRUCTURAL"
4 = "STRUCTURAL"
5 = "STRUCTURAL"
6 = "STRUCTURAL"

[params.transitions.STRUCTURAL]
# WIDENED COMPUTE WINDOW: 3-6 → COMPUTE (was 3-4 only)
# High-density survival at 7-8 restored (was SENSOR in v0.5.0)
# This is the primary lever for COMPUTE production.
0 = "STRUCTURAL"
1 = "STRUCTURAL"
2 = "STRUCTURAL"
3 = "COMPUTE"
4 = "COMPUTE"
5 = "COMPUTE"
6 = "COMPUTE"
7 = "STRUCTURAL"
8 = "STRUCTURAL"

[params.transitions.COMPUTE]
# WIDENED survival: 0-5 (was 1-3). COMPUTE now persists in moderate density.
# Only converts at 6+ neighbours (extreme crowding).
0 = "COMPUTE"
1 = "COMPUTE"
2 = "COMPUTE"
3 = "COMPUTE"
4 = "COMPUTE"
5 = "COMPUTE"
6 = "ENERGY"

[params.transitions.ENERGY]
# Asymmetric stability: ENERGY persists 0-5, routes to SENSOR at 6-8.
# (Unchanged from v0.5.0 — ENERGY was not the problem.)
0 = "ENERGY"
1 = "ENERGY"
2 = "ENERGY"
3 = "ENERGY"
4 = "ENERGY"
5 = "ENERGY"
6 = "SENSOR"
7 = "SENSOR"
8 = "SENSOR"

[params.transitions.SENSOR]
# SENSOR stable 0-6 (unchanged from v0.5.0).
0 = "SENSOR"
1 = "SENSOR"
2 = "SENSOR"
3 = "SENSOR"
4 = "SENSOR"
5 = "SENSOR"
6 = "SENSOR"

[params.contagion]
enabled = true
# State-aware neighbor influence thresholds — raised to reduce pressure.
energy_neighbor_threshold = 5
sensor_neighbor_threshold = 5
# STRUCTURAL contagion unchanged (these convert to ENERGY/SENSOR).
structural_energy_conversion_prob = 0.34
structural_sensor_conversion_prob = 0.34
# COMPUTE contagion HALVED — let COMPUTE survive near ENERGY/SENSOR clusters.
compute_energy_conversion_prob = 0.15
compute_sensor_conversion_prob = 0.15

[params.stochastic]
enabled = true
# Baseline chaos rate retained at 8%.
baseline_transition_prob = 0.08
# STRUCTURAL stochastic specialization (retained).
structural_to_energy_prob = 0.06
structural_to_sensor_prob = 0.06
# COMPUTE stochastic drain SLASHED from 10% to 3% each.
compute_to_energy_prob = 0.03
compute_to_sensor_prob = 0.03
# Decay rates.
structural_to_void_decay_prob = 0.025
energy_to_void_decay_prob = 0.004
sensor_to_void_decay_prob = 0.003

[params.density_targeting]
# Nemo's density-targeting probability curve (THE KEY v0.6.0 INNOVATION).
# When COMPUTE fraction < target, boost STRUCTURAL→COMPUTE creation rate.
# When COMPUTE fraction >= target, suppress it to prevent overshoot.
enabled = true
compute_target_fraction = 0.25
boost_probability = 0.85
suppress_probability = 0.35

[params.decay]
enabled = true
# 6-step inactivity threshold (unchanged from v0.5.0).
inactivity_neighbor_threshold = 1
structural_inactive_steps_to_decay = 6

[params.meta]
description = "v0.6 The COMPUTE Awakening — density-targeting + wider windows break the 1% bottleneck"
author = "Nemo (Kimi K2.5) + Jack (GPT-5.4) + Claude (Opus 4.6) + AURA (Gemini)"
version = "0.6.0"
target_lambda = 1.7
