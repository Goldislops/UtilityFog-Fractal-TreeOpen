# CA Rule v0.5.0 — The Great Rebalancing
#
# v0.4.0 overshot into SENSOR monoculture (92.9% SENSOR, H=0.19).
# v0.5.0 rebalances the ecosystem:
#   - STRUCTURAL gets a survival window at 0-2 neighbours
#   - COMPUTE gets a wider stable band (1-3) to actually accumulate
#   - SENSOR nerfed: stable 0-6 only (loses 7-8 invincibility)
#   - VOID nucleation widened to 3-6 for better scaffold regeneration
#   - Contagion symmetrized: ENERGY/SENSOR recruit equally
#   - Decay gentled: 2.5% structural decay, 6-step inactivity threshold

[rule]
name = "branching-growth-v0.5"
states = ["VOID", "STRUCTURAL", "COMPUTE", "ENERGY", "SENSOR"]
neighborhood = "moore-3d"
transition = "outer-totalistic"

[params]
# Deterministic backbone; stochastic/contagion sections introduce non-determinism.

# --- Transitions: { neighbour_count = "TARGET_STATE" } ---

[params.transitions.VOID]
# Wider nucleation window (added 3) for better scaffold regeneration.
3 = "STRUCTURAL"
4 = "STRUCTURAL"
5 = "STRUCTURAL"
6 = "STRUCTURAL"

[params.transitions.STRUCTURAL]
# BUFFED: Survival at 0-2 neighbours gives scaffold breathing room.
# Still differentiates at higher counts to prevent lock-in.
0 = "STRUCTURAL"
1 = "STRUCTURAL"
2 = "STRUCTURAL"
3 = "COMPUTE"
4 = "COMPUTE"
5 = "ENERGY"
6 = "SENSOR"
7 = "SENSOR"
8 = "SENSOR"

[params.transitions.COMPUTE]
# BUFFED: Wider accumulation band (1-3) so COMPUTE actually persists.
1 = "COMPUTE"
2 = "COMPUTE"
3 = "COMPUTE"
4 = "ENERGY"
5 = "SENSOR"
6 = "SENSOR"

[params.transitions.ENERGY]
# Asymmetric stability: ENERGY persists across a broad support window.
# (Unchanged from v0.4.0 — ENERGY was not the problem.)
0 = "ENERGY"
1 = "ENERGY"
2 = "ENERGY"
3 = "ENERGY"
4 = "ENERGY"
5 = "ENERGY"
6 = "SENSOR"
7 = "SENSOR"
8 = "SENSOR"

[params.transitions.SENSOR]
# NERFED: Removed stability at 7-8 neighbours.
# SENSOR can now be overwhelmed in very dense clusters.
0 = "SENSOR"
1 = "SENSOR"
2 = "SENSOR"
3 = "SENSOR"
4 = "SENSOR"
5 = "SENSOR"
6 = "SENSOR"

[params.contagion]
enabled = true
# State-aware neighbor influence thresholds.
energy_neighbor_threshold = 4
sensor_neighbor_threshold = 4
# SYMMETRIZED: ENERGY and SENSOR recruit equally from STRUCTURAL/COMPUTE.
structural_energy_conversion_prob = 0.34
structural_sensor_conversion_prob = 0.34
compute_energy_conversion_prob = 0.30
compute_sensor_conversion_prob = 0.30

[params.stochastic]
enabled = true
# Cranked chaos baseline (retained: 8%).
baseline_transition_prob = 0.08
# Direct stochastic specialization from scaffold and compute states.
structural_to_energy_prob = 0.08
structural_to_sensor_prob = 0.08
compute_to_energy_prob = 0.10
compute_to_sensor_prob = 0.10
# GENTLED: STRUCTURAL decay halved from 4.5% to 2.5%.
structural_to_void_decay_prob = 0.025
energy_to_void_decay_prob = 0.004
sensor_to_void_decay_prob = 0.003

[params.decay]
enabled = true
# GENTLED: 6-step threshold (up from 4) gives STRUCTURAL more time to differentiate.
inactivity_neighbor_threshold = 1
structural_inactive_steps_to_decay = 6

[params.meta]
description = "v0.5 Great Rebalancing — cure the SENSOR monoculture, restore heterogeneous harmony"
author = "Jack (GPT-5.4) + AURA (Gemini) + Claude + UtilityFog Team"
version = "0.5.0"
target_lambda = 1.7
