# CA Rule v0.2.0 — Jack's Differentiation Overhaul
#
# Breaks the STRUCTURAL bottleneck by opening direct specialisation
# channels at higher neighbour counts and lowering thresholds for
# COMPUTE -> ENERGY / SENSOR transitions.

[rule]
name = "branching-growth-differentiation"
states = ["VOID", "STRUCTURAL", "COMPUTE", "ENERGY", "SENSOR"]
neighborhood = "moore-3d"
transition = "outer-totalistic"

[params]
# Outer-totalistic transitions based on neighbor count
# Format: current_state = { neighbor_count = next_state }

[params.transitions]
# VOID cells nucleate into STRUCTURAL with 3-6 neighbours (was 4-6)
VOID = { 3 = "STRUCTURAL", 4 = "STRUCTURAL", 5 = "STRUCTURAL", 6 = "STRUCTURAL" }

# STRUCTURAL differentiates early: COMPUTE at 3-4, plus direct
# high-density channels to ENERGY (5,7) and SENSOR (6,8)
STRUCTURAL = { 2 = "STRUCTURAL", 3 = "COMPUTE", 4 = "COMPUTE", 5 = "ENERGY", 6 = "SENSOR", 7 = "ENERGY", 8 = "SENSOR" }

# COMPUTE specialises faster: ENERGY at 2-3, SENSOR at 4-5
COMPUTE = { 2 = "ENERGY", 3 = "ENERGY", 4 = "SENSOR", 5 = "SENSOR" }

# ENERGY stable under moderate support (2-5 neighbours)
ENERGY = { 2 = "ENERGY", 3 = "ENERGY", 4 = "ENERGY", 5 = "ENERGY" }

# SENSOR stable under moderate support (2-5 neighbours)
SENSOR = { 2 = "SENSOR", 3 = "SENSOR", 4 = "SENSOR", 5 = "SENSOR" }

[params.meta]
description = "Differentiation-focused rule — breaks STRUCTURAL bottleneck with direct specialisation channels"
author = "Jack (GPT-5.4) + UtilityFog Team"
version = "0.2.0"
target_lambda = 1.5  # Target branching factor (edge of chaos)
